<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Routine">
<title>My Routine</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F1EB;--card:#FFFFFF;--pri:#2C4B2F;--acc:#C8963E;
  --txt:#1A2A1C;--mid:#556655;--soft:#8A9E8C;--div:#E2DAD0;
  --donebg:#EBF5EC;--donebd:#A8D5AB;--donec:#2E7D32;
  --gym1:#1B5E20;--gym2:#0A3311;--rest1:#37474F;--rest2:#1C2B30;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:#F5F1EB;color:#1A2A1C;min-height:100dvh;overflow-x:hidden}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid #E2DAD0;display:flex;z-index:99;padding-bottom:env(safe-area-inset-bottom,0px)}
.nv{flex:1;padding:10px 4px 9px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;font-family:‘Nunito’,sans-serif;color:#8A9E8C;font-size:10.5px;font-weight:700;transition:color .2s}
.nv.on{color:#2C4B2F}
.nv .ni{font-size:22px;line-height:1.2}

/* VIEWS */
.view{display:none;padding-bottom:80px}
.view.on{display:block}

/* HEADER */
.hdr{padding:calc(env(safe-area-inset-top,0px) + 12px) 15px 0;background:#F5F1EB;position:sticky;top:0;z-index:90}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{font-family:‘Lora’,serif;font-size:20px;font-weight:700;color:#2C4B2F}
.ib{width:34px;height:34px;border-radius:50%;border:none;background:#ece8e0;color:#444;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* BANNER */
.banner{border-radius:14px;padding:16px 15px 13px;margin-bottom:11px;color:#fff;position:relative;overflow:hidden}
.banner.gym{background:linear-gradient(135deg,#1B5E20,#0A3311)}
.banner.rest{background:linear-gradient(135deg,#37474F,#1C2B30)}
.banner *{color:#ffffff !important}
.stagepill{background:rgba(255,255,255,.16);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;color:#fff}
.banner::before{content:’’;position:absolute;right:-20px;top:-20px;width:95px;height:95px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.brow1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.dayname{font-family:“Lora”,serif;font-size:30px;font-weight:700;line-height:1.1;color:#fff}
.badge{display:inline-block;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-top:5px;color:#fff}
.breset{background:rgba(255,255,255,.17);border:none;color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brow2{margin-top:9px;display:flex;align-items:center;gap:7px}

.pbar-wrap{flex:1;background:rgba(255,255,255,.2);border-radius:6px;height:4px;overflow:hidden;min-width:0}
.pbar-fill{height:100%;background:rgba(255,255,255,.85);border-radius:6px;transition:width .5s}
.pbar-lbl{font-size:10.5px;color:#fff;opacity:.85;white-space:nowrap;flex-shrink:0}
.brow3{margin-top:6px;display:flex;align-items:center;gap:7px}
.dbar-wrap{flex:1;background:rgba(255,255,255,.14);border-radius:6px;height:3px;overflow:hidden;min-width:0}
.dbar-fill{height:100%;background:rgba(255,255,255,.75);border-radius:6px;transition:width .4s}
.dbar-lbl{font-size:10.5px;color:#fff;opacity:.75;white-space:nowrap;flex-shrink:0}

/* TABS */
.tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid #E2DAD0;background:#FFFFFF;font-family:‘Nunito’,sans-serif;font-size:12.5px;font-weight:700;color:#556655;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;transition:all .2s}
.tab.on{background:#2C4B2F;border-color:#2C4B2F;color:#fff}
.tab.done:not(.on){border-color:#4CAF50;color:#2E7D32}
.tcnt{font-size:10px;padding:1px 5px;border-radius:10px;background:#E2DAD0;color:#8A9E8C}
.tab.on .tcnt{background:rgba(255,255,255,.22);color:#fff}
.tab.done:not(.on) .tcnt{background:#E8F5E9;color:#2E7D32}

/* STEP CARDS */
html{scroll-padding-top:320px}
.steps{padding:0 15px 16px;padding-top:8px}
.edit-step{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:10px;border:1.5px solid #E2DAD0;font-size:13.5px;color:#1A2A1C;font-weight:600;cursor:pointer;transition:all .2s}
.edit-step.edit-done{background:#EBF5EC;border-color:#A8D5AB;color:#2E7D32;text-decoration:line-through;opacity:.8}
.sublbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#8A9E8C;margin-bottom:7px}
.sublbl.first{margin-top:4px}
.sublbl:not(.first){margin-top:18px}
.card{background:#FFFFFF;border:1.5px solid transparent;border-radius:12px;padding:13px 14px;margin-bottom:7px;display:flex;gap:11px;align-items:flex-start;cursor:pointer;transition:background .2s,border-color .2s;box-shadow:0 1px 5px rgba(0,0,0,.07);-webkit-user-select:none;user-select:none}
.card.done{background:#EBF5EC;border-color:#A8D5AB}
.card .ico{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:#F5F1EB}
.card.done .ico{background:#2E7D32;font-size:18px}
.card .info{flex:1;min-width:0}
.card .ct{font-size:14px;font-weight:800;margin-bottom:2px;color:#1A2A1C}
.card.done .ct{text-decoration:line-through;color:#8A9E8C}
.card .cp{font-size:11.5px;font-weight:700;color:#C8963E;margin-bottom:4px}
.card.done .cp{color:#81C784}
.card .cd{font-size:12px;color:#556655;line-height:1.55}
.card.done .cd{color:#A5D6A7}
.empty-tab{text-align:center;padding:50px 20px;color:#8A9E8C}
.empty-tab .ei{font-size:44px;margin-bottom:10px}

/* PAGE HEADERS */
.ph{padding:calc(env(safe-area-inset-top,0px)+12px) 15px 13px;display:flex;align-items:center;gap:10px;background:#F5F1EB;position:sticky;top:0;z-index:90;border-bottom:1.5px solid #E2DAD0}
.ph-title{font-family:‘Lora’,serif;font-size:22px;font-weight:700;color:#2C4B2F;flex:1}
.pbody{padding:12px 15px 16px}

/* CARDS (settings/history) */
.sc{background:#FFFFFF;border-radius:12px;padding:16px;margin-bottom:11px;box-shadow:0 1px 5px rgba(0,0,0,.07)}
.sl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#8A9E8C;margin-bottom:9px;display:block}
.sdesc{font-size:12.5px;color:#556655;line-height:1.6;margin-bottom:11px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #E2DAD0}
.srow:last-child{border-bottom:none}
.sk{font-size:13px;color:#556655}
.sv{font-size:13px;font-weight:800;color:#1A2A1C}
input[type=date]{width:100%;padding:11px 13px;border:1.5px solid #E2DAD0;border-radius:10px;font-family:‘Nunito’,sans-serif;font-size:14px;color:#1A2A1C;background:#F5F1EB;outline:none;-webkit-appearance:none}
input[type=date]:focus{border-color:#2C4B2F}
.stage-row{display:flex;gap:8px}
.stage-opt{flex:1;padding:13px 6px;border-radius:12px;text-align:center;cursor:pointer;border:1.5px solid #E2DAD0;background:#F5F1EB;transition:all .2s}
.stage-opt.sel{border-color:#2C4B2F;background:#EAF4EB}
.stage-num{font-family:‘Lora’,serif;font-size:24px;font-weight:700;color:#2C4B2F}
.stage-lbl{font-size:10.5px;font-weight:700;color:#8A9E8C;margin-top:2px}
.alert-box{border-radius:12px;padding:14px;margin-bottom:11px;border:1.5px solid}
.alert-box.warn{background:#FFF3E0;border-color:#FF9800}
.alert-box.info{background:#E3F2FD;border-color:#64B5F6}
.alert-box .at{font-size:14px;font-weight:800;margin-bottom:5px}
.alert-box.warn .at{color:#E65100}
.alert-box.info .at{color:#1565C0}
.alert-box .ab{font-size:12.5px;line-height:1.55;color:#5D4037;margin-bottom:11px}
.btn{width:100%;padding:13px;border-radius:11px;font-family:‘Nunito’,sans-serif;font-size:14px;font-weight:800;border:none;background:#2C4B2F;color:#fff;cursor:pointer}

/* HISTORY */
.streak-card{border-radius:14px;padding:20px;margin-bottom:11px;text-align:center;background:linear-gradient(135deg,#E65100,#FF6D00);color:#fff}
.streak-num{font-family:‘Lora’,serif;font-size:58px;font-weight:700;line-height:1}
.streak-lbl{font-size:13px;font-weight:700;margin-top:4px;opacity:.9}
.streak-sub{font-size:11.5px;margin-top:3px;opacity:.7}
.motiv-card{border-radius:14px;padding:17px 16px;margin-bottom:11px;background:linear-gradient(135deg,#1B5E20,#2E7D32);color:#fff;text-align:center}
.motiv-e{font-size:38px;margin-bottom:8px}
.motiv-t{font-size:14.5px;font-weight:800;line-height:1.4}
.motiv-s{font-size:12px;opacity:.75;margin-top:5px;line-height:1.5}
.wbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.wbar-lbl{font-size:11.5px;color:#556655;width:30px;flex-shrink:0;text-align:right;font-weight:700}
.wbar-bg{flex:1;background:#E2DAD0;border-radius:7px;height:16px;overflow:hidden;min-width:0}
.wbar-fill{height:100%;border-radius:7px;transition:width .6s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.wbar-pct{font-size:10.5px;font-weight:800;color:#fff}
.wbar-out{font-size:10.5px;font-weight:800;flex-shrink:0}
.hmap{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.hday{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:rgba(255,255,255,.9)}
.hday.empty-slot{background:transparent}
.hday.no-data{background:#E2DAD0;color:#8A9E8C}
.hday.perfect{background:#2E7D32}
.hday.good{background:#66BB6A}
.hday.partial{background:#FFB74D;color:#5D4037}
.hday.missed{background:#EF9A9A;color:#B71C1C}
.hday.today{box-shadow:0 0 0 2.5px #2C4B2F}
.legend{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#556655}
.leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.miss-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #E2DAD0;font-size:12.5px}
.miss-row:last-child{border-bottom:none}
.miss-name{flex:1;color:#556655}
.miss-count{font-weight:800;color:#C62828;font-size:13px}
.achiev-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.achiev-cell{background:#F5F1EB;border-radius:10px;padding:12px 10px;text-align:center}
.achiev-n{font-family:‘Lora’,serif;font-size:26px;font-weight:700;color:#2C4B2F}
.achiev-l{font-size:11px;color:#8A9E8C;font-weight:700;margin-top:2px}

/* RATING PILLS */
.rpill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:800}
.rpill.perfect{background:#E8F5E9;color:#2E7D32}
.rpill.good{background:#E3F2FD;color:#1565C0}
.rpill.partial{background:#FFF3E0;color:#E65100}
.rpill.missed{background:#FFEBEE;color:#C62828}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(12px);background:#1C2B1E;color:#fff;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

</head>
<body>

<!-- ROUTINE VIEW -->

<div id="vRoutine" class="view on">
  <div class="hdr">
    <div class="hdr-top">
      <span class="logo">🌿 My Routine</span>
      <button class="ib" onclick="switchView('Settings')">⚙️</button>
    </div>
    <div id="banner" class="banner gym">
      <div class="brow1">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="breset" onclick="navDay(-1)" title="Previous day">◀</button>
          <div>
            <div id="bDay" class="dayname">Loading...</div>
            <span id="bBadge" class="badge">...</span>
          </div>
          <button class="breset" id="btnNext" onclick="navDay(1)" title="Next day">▶</button>
        </div>
        <button class="breset" onclick="resetDay()">↺</button>
      </div>
      <div class="brow2">
        <span id="bStage" class="stagepill">Stage 1</span>
        <div class="pbar-wrap"><div id="bPFill" class="pbar-fill" style="width:0%"></div></div>
        <span id="bPLbl" class="pbar-lbl"></span>
      </div>
      <div class="brow3">
        <div class="dbar-wrap"><div id="bDFill" class="dbar-fill" style="width:0%"></div></div>
        <span id="bDLbl" class="dbar-lbl">0/0 done</span>
      </div>
    </div>
    <div class="tabs">
      <button id="tm" class="tab on" onclick="setTab('m')">🌅 Morning <span id="cm" class="tcnt">0/0</span></button>
      <button id="tw" class="tab"    onclick="setTab('w')">🕌 Wudu <span id="cw" class="tcnt">0/0</span></button>
      <button id="te" class="tab"    onclick="setTab('e')">🌆 Evening <span id="ce" class="tcnt">0/0</span></button>
      <button id="tn" class="tab"    onclick="setTab('n')">🌙 Night <span id="cn" class="tcnt">0/0</span></button>
    </div>
  </div>
  <div id="steps" class="steps"></div>
</div>

<!-- HISTORY VIEW -->

<div id="vHistory" class="view">
  <div class="ph">
    <span class="ph-title">📊 History</span>
  </div>
  <div class="pbody" id="histBody"></div>
</div>

<!-- SETTINGS VIEW -->

<div id="vSettings" class="view">
  <div class="ph">
    <button class="ib" onclick="switchView('Routine')">←</button>
    <span class="ph-title">Settings</span>
  </div>
  <div class="pbody">
    <div id="alertBox"></div>
    <div class="sc"><span class="sl">📊 Progress</span><div id="statBox"></div></div>
    <div class="sc">
      <span class="sl">📅 Stage Start Date</span>
      <p class="sdesc">When did you start your current stage? This calculates your week number and stage upgrade alerts.</p>
      <input type="date" id="dateIn" onchange="saveDate(this.value)">
    </div>
    <div class="sc">
      <span class="sl">🎯 Current Stage</span>
      <p class="sdesc">Tap to switch stage. Start date resets automatically on upgrade.</p>
      <div class="stage-row" id="stageRow"></div>
    </div>
    <div class="sc">
      <span class="sl">ℹ️ How to Use</span>
      <div id="howBox"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->

<div class="nav">
  <button class="nv on" id="nRoutine" onclick="switchView('Routine')"><span class="ni">📋</span>Routine</button>
  <button class="nv" id="nHistory" onclick="switchView('History')"><span class="ni">📊</span>History</button>
</div>

<div id="toast" class="toast"></div>

<script>
// ═══════════════════════ STORAGE ═══════════════════════
const SK = 'myroutine_v3';
function loadState(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dayOfWeek(){return new Date().getDay();}

// ═══════════════════════ STATE ═══════════════════════
let ST = loadState();
if(!ST.stage)     ST.stage = 1;
if(!ST.startDate) ST.startDate = todayStr();
if(!ST.history)   ST.history = {};  // all-time record: {date:{done,total,gymDay,allIds,checkedIds}}
if(!ST.checks)    ST.checks = {};
if(!ST.bestStreak)ST.bestStreak = 0;

// Carry over yesterday to history before clearing today's checks
const td = todayStr();
if(ST.lastDay && ST.lastDay !== td && ST.lastDay && ST.curInfo){
  const prev = ST.lastDay;
  const ch = ST.checks[prev] || [];
  if(!ST.history[prev]){
    ST.history[prev] = {
      done: ch.length,
      total: ST.curInfo.total,
      gymDay: ST.curInfo.gymDay,
      allIds: ST.curInfo.allIds || [],
      checkedIds: ch
    };
  }
  delete ST.checks[prev];
}
ST.lastDay = td;
saveState();

// ═══════════════════════ CONSTANTS ═══════════════════════
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const GYM=[1,3,5], OIL=[1,3];
const RATING_COLORS={perfect:'#2E7D32',good:'#1976D2',partial:'#E65100',missed:'#C62828',none:'#BDBDBD'};

// ═══════════════════════ STEP BUILDER ═══════════════════════
function S(id,ico,title,prod,det,sub){return{id,ico,title,prod,det,sub:sub||null};}

function elbowStep(stage,day){
  if(stage===1){
    const m={
      0:S('el','💚','Niacinamide → Body Oil','Niacinamide 10% + Body Oil','Press into dry elbows and knees. Seal with 2–3 drops body oil on top.'),
      1:S('el','💛','Soronil Option A → Niacinamide','Soronil 40% Urea + Niacinamide','BEFORE shower: apply Soronil, wait 15 min, rinse in shower. AFTER: Niacinamide + 2–3 drops body oil.'),
      2:S('el','💚','Niacinamide → Body Oil','Niacinamide 10% + Body Oil','Niacinamide on elbows/knees. Seal with body oil.'),
      3:S('el','🔆','Soronil Option B — Overnight','Soronil 40% Urea + Vaseline','After shower on DRY skin: generous Soronil → thin Vaseline on top. No other active tonight.'),
      4:S('el','💚','Niacinamide → Body Oil','Niacinamide 10% + Body Oil','Niacinamide on elbows/knees. Seal with body oil.'),
      5:S('el','💚','Niacinamide → Body Oil','Niacinamide 10% + Body Oil','Niacinamide on elbows/knees. Seal with body oil.'),
      6:S('el','💛','Soronil Option A (Sink Rinse)','Soronil 40% Urea + Niacinamide','No shower. Soronil 15 min, rinse at SINK. After: Niacinamide + body oil.'),
    };return m[day];
  }
  const m={
    0:S('el','🌿','Dermive — Rest Night','Jenpharm Dermive Sensitive','Rest night — no actives. Apply Dermive generously to elbows/knees.'),
    1:S('el','🔆','Soronil Option B Overnight','Soronil 40% Urea + Vaseline','After shower: Soronil → Vaseline overnight. No other active.'),
    2:S('el','💚','Niacinamide → Body Oil','Niacinamide 10% + Body Oil','Niacinamide on elbows/knees. Seal with body oil.'),
    3:S('el','💛','Soronil Option A → Niacinamide','Soronil + Niacinamide','Before shower: Soronil 15 min, rinse. After: Niacinamide + body oil.'),
    4:S('el','🔵','Azelaic Acid → Body Oil','Azelaic Acid 10% + Body Oil','Press Azelaic Acid into dry elbows/knees. Seal with body oil.'),
    5:S('el','💚','Niacinamide → Body Oil','Niacinamide 10% + Body Oil','Niacinamide on elbows/knees. Seal.'),
    6:S('el','💛','Soronil Option A → Azelaic Acid','Soronil + Azelaic Acid 10%','No shower. Soronil 15 min, sink rinse. After: Azelaic Acid + body oil.'),
  };return m[day];
}

function feetStep(stage,day){
  if(stage===1)return S('ft','🦶','Foot Treatment — Soronil (Every Night)','Soronil 40% Urea + Vaseline + cotton sock','Soak prayer callus spots 5 min warm water. Pat dry. Soronil on spots only. Thin Vaseline. Cotton sock overnight.');
  if([5,6].includes(day))return S('ft','💛','Foot Treatment — Soronil (Weekly)','Soronil + Vaseline + sock','Soak 5 min. Thin Soronil 10 min, rinse. Vaseline + sock overnight.');
  return S('ft','🦶','Foot Brightening',(day%2===0?'Niacinamide 10%':'Azelaic Acid 10%')+' + Vaseline + sock','Soak spots 5 min. Apply serum to callus areas. Vaseline on top. Cotton sock overnight.');
}

function buildRoutine(stage,day){
  const gym=GYM.includes(day),oil=OIL.includes(day);
  const M=[],W=[],E=[],N=[];
  const pfx=`s${stage}d${day}-`;

  // ── MORNING ──
  if(gym){
    if(oil)M.push(S('hoil','💆','Hair Oil','Hair Oil Blend — 1 ml','SCALP ONLY. Firm circular massage 3–5 min with fingertip pads. Leave on during gym (~2 hrs).','🏋️ Before Gym'));

// ═══════════════════════ HELPERS ═══════════════════════
function weekNum(){
  const diff=Math.floor((Date.now()-new Date(ST.startDate).getTime())/86400000);
  return Math.max(1,Math.floor(diff/7)+1);
}
function getChecked(){return ST.checks[td]||[];}
function todayRating(){if(isViewingPast())return'none';
  if(!curRoutine)return'none';
  const all=[...curRoutine.m,...curRoutine.w,...curRoutine.e,...curRoutine.n];
  return getRating(getChecked().length,all.length);
}
function getRating(done,total){
  if(!total)return'none';
  const p=done/total;
  if(p>=1)return'perfect';
  if(p>=0.75)return'good';
  if(p>=0.4)return'partial';
  if(done>0)return'partial';
  return'missed';
}
function ratingColor(r){return RATING_COLORS[r]||RATING_COLORS.none;}
function ratingLabel(r){return{perfect:'⭐ Perfect',good:'👍 Good',partial:'⚠️ Partial',missed:'❌ Missed',none:'—'}[r]||'—';}

let toastT;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2500);
}

// ═══════════════════════ ROUTINE RENDER ═══════════════════════
let curTab='m', curRoutine=null;
let viewOffset=0; // 0=today, -1=yesterday, etc.

function viewDateStr(){
  const d=new Date(); d.setDate(d.getDate()+viewOffset);
  return d.toISOString().slice(0,10);
}
function viewDayOfWeek(){
  const d=new Date(); d.setDate(d.getDate()+viewOffset);
  return d.getDay();
}
function getChecked(){
  const vd=viewDateStr();
  if(vd===td) return ST.checks[td]||[];
  // Past day — from history
  return (ST.history[vd]&&ST.history[vd].checkedIds)||[];
}
function isViewingPast(){return viewOffset<0;}

function navDay(dir){
  // Can't go forward past today
  if(dir>0&&viewOffset>=0){showToast('Already on today');return;}
  // Don't go back more than 30 days
  if(dir<0&&viewOffset<=-30){showToast('Max 30 days back');return;}
  viewOffset+=dir;
  render();
  setTab('m');
  document.getElementById('btnNext').style.opacity=viewOffset>=0?'0.3':'1';
}

function render(){
  const day=viewDayOfWeek(), gym=GYM.includes(day);
  const vd=viewDateStr();
  const isPast=isViewingPast();

  curRoutine=buildRoutine(ST.stage,day);
  const all=[...curRoutine.m,...curRoutine.w,...curRoutine.e,...curRoutine.n];

  // Only save curInfo for today
  if(!isPast){
    ST.curInfo={total:all.length,gymDay:gym,allIds:all.map(s=>s.id)};
    saveState();
  }

  // Banner
  document.getElementById('banner').className='banner '+(gym?'gym':'rest');
  const dayLabel=isPast
    ? (viewOffset===-1?'Yesterday':DAYS[day]+' ('+viewOffset+' days ago)')
    : DAYS[day];
  document.getElementById('bDay').textContent=dayLabel;

  let badge=gym?'🏋️ Gym Day':'😴 Rest Day';
  if(isPast){
    const hist=ST.history[vd];
    if(hist){
      const r=getRating(hist.done,hist.total);
      badge+=' · '+ratingLabel(r);
    } else {
      badge+=' · No data saved';
    }
  }
  document.getElementById('bBadge').textContent=badge;

  // Reset button label
  document.getElementById('btnNext').style.opacity=viewOffset>=0?'0.3':'1';

  // Stage progress bar
  const wk=weekNum(), lim={1:12,2:8,3:999}[ST.stage];
  const stagePct=lim<999?Math.min(100,Math.round(wk/lim*100)):100;
  document.getElementById('bStage').textContent='Stage '+ST.stage;
  document.getElementById('bPFill').style.width=stagePct+'%';
  document.getElementById('bPLbl').textContent=lim<999?`Wk ${wk}/${lim}`:`Wk ${wk}`;

  updateTabs();
  renderSteps();
  updateDailyBar();
}

function updateTabs(){
  const ch=getChecked();
  [{k:'m',ti:'tm',ci:'cm'},{k:'w',ti:'tw',ci:'cw'},{k:'e',ti:'te',ci:'ce'},{k:'n',ti:'tn',ci:'cn'}].forEach(({k,ti,ci})=>{
    const steps=curRoutine[k]||[];
    const d=steps.filter(s=>ch.includes(s.id)).length;
    const allDone=steps.length>0&&d===steps.length;
    const btn=document.getElementById(ti);
    btn.className='tab'+(k===curTab?' on':allDone?' done':'');
    document.getElementById(ci).textContent=allDone?'✓':`${d}/${steps.length}`;
  });
}

function renderSteps(){
  const steps=curRoutine[curTab]||[];
  const ch=getChecked();
  const cont=document.getElementById('steps');
  let pastBanner='';
  if(isViewingPast()){
    const vd=viewDateStr();
    const d=new Date(vd);
    const lbl=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
    const hasSaved=!!(ST.history[vd]&&ST.history[vd].total>0);
    pastBanner=`<div style="background:#FFF8E1;border:1.5px solid #FFD54F;border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:12.5px;color:#795548;line-height:1.5">
      ✏️ <b>Editing Past Day — ${lbl}</b><br>
      ${hasSaved?'Tap any step to toggle ✅ done or ☐ undone.':'No data saved yet — tap steps to mark what you did.'}
    </div>`;
  }
  if(!steps.length){
    cont.innerHTML=pastBanner+'<div class="empty-tab"><div class="ei">😌</div><p style="font-size:13.5px;line-height:1.6">Nothing here today.<br>Rest day simplicity.</p></div>';
    return;
  }
  let html=pastBanner,lastSub=null,isFirst=true;
  steps.forEach(s=>{
    if(s.sub&&s.sub!==lastSub){
      html+=`<div class="sublbl${isFirst?' first':''}">${s.sub}</div>`;
      lastSub=s.sub;isFirst=false;
    }
    const done=ch.includes(s.id);
    html+=`<div class="card${done?' done':''}" onclick="toggleStep('${s.id}')">
      <div class="ico">${done?'✅':s.ico}</div>
      <div class="info">
        <div class="ct">${s.title}</div>
        <div class="cp">${s.prod}</div>
        <div class="cd">${s.det}</div>
      </div>
    </div>`;
  });
  cont.innerHTML=html;
}

function updateDailyBar(){
  if(!curRoutine)return;
  const all=[...curRoutine.m,...curRoutine.w,...curRoutine.e,...curRoutine.n];
  const ch=getChecked();
  const d=ch.length, t=all.length;
  const pct=t?Math.round(d/t*100):0;
  document.getElementById('bDFill').style.width=pct+'%';
  document.getElementById('bDLbl').textContent=`${d}/${t} done`;
}

function toggleStep(id){
  const vd=viewDateStr();
  const isPast=isViewingPast();
  if(isPast){
    if(!ST.history[vd]){
      const all=[...curRoutine.m,...curRoutine.w,...curRoutine.e,...curRoutine.n];
      ST.history[vd]={done:0,total:all.length,gymDay:GYM.includes(viewDayOfWeek()),allIds:all.map(s=>s.id),checkedIds:[]};
    }
    const h=ST.history[vd];
    if(!h.checkedIds)h.checkedIds=[];
    const i=h.checkedIds.indexOf(id);
    i>=0?h.checkedIds.splice(i,1):h.checkedIds.push(id);
    h.done=h.checkedIds.length;
  } else {
    if(!ST.checks[td])ST.checks[td]=[];
    const i=ST.checks[td].indexOf(id);
    i>=0?ST.checks[td].splice(i,1):ST.checks[td].push(id);
  }
  saveState();
  updateTabs();
  const ch=getChecked();
  const done=ch.includes(id);
  const card=document.querySelector(`.card[onclick="toggleStep('${id}')"]`);
  if(card){
    card.classList.toggle('done',done);
    const ico=card.querySelector('.ico');
    const step=[...curRoutine.m,...curRoutine.w,...curRoutine.e,...curRoutine.n].find(s=>s.id===id);
    if(ico&&step)ico.textContent=done?'\u2705':step.ico;
    const ct=card.querySelector('.ct');
    if(ct){ct.style.textDecoration=done?'line-through':'none';ct.style.color=done?'#8A9E8C':'#1A2A1C';}
  }
  updateDailyBar();
}

function resetDay(){
  const vd=viewDateStr();
  if(isViewingPast()){
    if(ST.history[vd]){ST.history[vd].checkedIds=[];ST.history[vd].done=0;}
  } else {
    ST.checks[td]=[];
  }
  saveState();render();showToast('Day reset ↺');
}

function setTab(t){
  curTab=t;updateTabs();renderSteps();
  window.scrollTo({top:0,behavior:'smooth'});
}

function navToDate(ds){
  // Calculate offset from today
  const today=new Date(td);
  const target=new Date(ds);
  const diff=Math.round((target-today)/(1000*60*60*24));
  if(diff>0){showToast('Cannot go to future');return;}
  if(diff<-30){showToast('Max 30 days back');return;}
  viewOffset=diff;
  switchView('Routine');
  render();
  setTab('m');
  document.getElementById('btnNext').style.opacity=viewOffset>=0?'0.3':'1';
}

// ═══════════════════════ HISTORY ═══════════════════════
function calcStreak(){
  let streak=0;
  for(let i=0;i<730;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    if(ds===td){
      // Today: only count if good/perfect
      const r=todayRating();
      if(r==='perfect'||r==='good'){streak++;continue;}
      else break;
    }
    const h=ST.history[ds];
    if(!h||h.total===0)break;
    const r=getRating(h.done,h.total);
    if(r==='perfect'||r==='good')streak++;
    else break;
  }
  return streak;
}

function getMotivMsg(streak,weekAvg){
  if(streak>=14)return{e:'🔥',t:'You are UNSTOPPABLE!',s:`${streak} days straight. This kind of consistency actually changes skin.`};
  if(streak>=7) return{e:'💪',t:'Full week — real commitment',s:'7+ days in a row. You\'re building a genuine habit now.'};
  if(streak>=3) return{e:'🌱',t:'3 days strong — keep going!',s:'The first 3 days are always the hardest. You\'ve passed them.'};
  if(streak>=1) return{e:'✨',t:`Day ${streak} — great start!`,s:'Every expert was once a beginner. Keep showing up.'};
  if(weekAvg>=80)return{e:'📈',t:'Strong week overall',s:'Excellent weekly average. Missed yesterday? No problem — just restart.'};
  return{e:'🌱',t:'Let\'s start fresh today',s:'Your skin doesn\'t judge missed days. Begin again — that\'s the only rule.'};
}

    </div>`;
  }
  html+=`<div style="font-size:11.5px;color:#8A9E8C;margin-top:8px;text-align:right">7-day avg: <b style="color:#1A2A1C;font-size:13px">${weekAvg}%</b></div></div>`;

  // 35-day heatmap
  html+=`<div class="sc">
    <span class="sl">🗓️ 35-Day Heatmap</span>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      ${['S','M','T','W','T','F','S'].map(l=>`<div style="flex:1;text-align:center;font-size:9.5px;font-weight:800;color:#8A9E8C">${l}</div>`).join('')}
    </div>
    <div class="hmap">
      ${'<div class="hday empty-slot"></div>'.repeat(firstDow)}
      ${mapDays.map(ds=>{
        const d=new Date(ds);
        const dn=d.getDate();
        const isToday=ds===td;
        let cls='no-data';
        if(isToday&&todayTotal>0)cls=todayR;
        else{const h=hist[ds];if(h&&h.total>0)cls=getRating(h.done,h.total);}
        return`<div class="hday ${cls}${isToday?' today':''}">${dn}</div>`;
      }).join('')}
    </div>
    <div class="legend">
      ${[['perfect','⭐ Perfect'],['good','👍 Good'],['partial','⚠️ Partial'],['missed','❌ Missed'],['no-data','No data']].map(([c,l])=>`<div class="leg-item"><div class="leg-dot" style="background:${c==='no-data'?'#E2DAD0':RATING_COLORS[c]}"></div>${l}</div>`).join('')}
    </div>
  </div>`;

  // Most skipped
  if(topMissed.length>0){
    html+=`<div class="sc"><span class="sl">⚠️ Most Skipped (Last 30 Days)</span>`;
    topMissed.forEach(([id,cnt])=>{
      html+=`<div class="miss-row"><span style="font-size:16px">❗</span><span class="miss-name">${stepNames[id]||id}</span><span class="miss-count">${cnt}× skipped</span></div>`;
    });
    html+=`</div>`;
  }

  // Achievements
  html+=`<div class="sc">
    <span class="sl">🏆 All-Time Achievements</span>
    <div class="achiev-grid">
      <div class="achiev-cell"><div class="achiev-n">${totalTracked}</div><div class="achiev-l">Days Tracked</div></div>
      <div class="achiev-cell"><div class="achiev-n">${perfectDays}⭐</div><div class="achiev-l">Perfect Days</div></div>
      <div class="achiev-cell"><div class="achiev-n">${streak}🔥</div><div class="achiev-l">Current Streak</div></div>
      <div class="achiev-cell"><div class="achiev-n">${ST.bestStreak}</div><div class="achiev-l">Best Streak Ever</div></div>
    </div>
  </div>`;

  // All-time daily log (last 14 days) with edit buttons
  const recent=Object.keys(hist).sort().reverse().slice(0,14);
  if(recent.length>0){
    html+=`<div class="sc"><span class="sl">📅 Recent Daily Log — tap to view & edit</span>`;
    recent.forEach(ds=>{
      const h=hist[ds];
      const r=getRating(h.done,h.total);
      const d=new Date(ds);
      const label=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
      html+=`<div class="srow" style="cursor:pointer" onclick="navToDate('${ds}')">
        <span class="sk" style="font-size:12px">${label}</span>
        <span class="sv" style="display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;color:#8A9E8C">${h.done}/${h.total}</span>
          <span class="rpill ${r}" style="font-size:10px;padding:2px 7px">${ratingLabel(r)}</span>
          <span style="font-size:11px;color:#1565C0">→</span>
        </span>
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('histBody').innerHTML=html;
}

// ═══════════════════════ PAST DAY EDITOR ═══════════════════════
function openDayEditor(ds){
  const h=ST.history[ds];
  if(!h)return;
  const d=new Date(ds);
  const label=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const r=getRating(h.done,h.total);

  // Build step list with checkboxes
  const stepNames={hoil:'Hair Oil',itpre:'Inner Thigh Protection (Pre-gym)',shamp:'Shampoo',cond:'Conditioner',mpep:'Multi-Peptide Hair Serum',bwash:'Body Wash',boil:'Body Oil',deo:'Deodorant',cln:'Cleanser',vitc:'Vitamin C',ha:'Hyaluronic Acid',caff:'Caffeine Solution (Eyes)',moist:'Moisturiser',spf:'SPF',lip:'Lip Balm (morning)',hnd:'Hand Care',niac:'Niacinamide (morning)',wspf:'SPF after Wudu',wlip:'Lip Balm after Wudu',el:'Elbows & Knees',it:'Inner Thigh',glyco:'Glycolic Acid',niacn:'Niacinamide (night)',hm:'Moisturiser (night)',eye:'Eye Cream',belly:'Belly Massage',ft:'Foot Treatment',lipn:'Lip Balm (night)',teeth:'Brush Teeth',sunw:'Sunday Face Wash',clay:'Clay Mask',lact:'Lactic Acid',sasa:'SA Cleanser',bha:'BHA Salicylic Acid'};

  let stepsHtml='';
  (h.allIds||[]).forEach(id=>{
    const short=id.split('-').pop();
    const name=stepNames[short]||short;
    const checked=(h.checkedIds||[]).includes(id);
    stepsHtml+=`<label class="edit-step${checked?' edit-done':''}">
      <input type="checkbox" ${checked?'checked':''} onchange="togglePastStep('${ds}','${id}',this.checked)" style="accent-color:#2E7D32;width:18px;height:18px;flex-shrink:0">
      <span>${name}</span>
    </label>`;
  });

  const overlay=document.createElement('div');
  overlay.id='dayEditorOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;display:flex;align-items:flex-end;justify-content:center';
  overlay.innerHTML=`
    <div style="background:#FAFAF7;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px 40px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="font-size:17px;font-weight:800;color:#1A2A1C">✏️ Edit Past Day</div>
        <button onclick="closeDayEditor()" style="background:none;border:none;font-size:22px;color:#8A9E8C;padding:4px">✕</button>
      </div>
      <div style="font-size:13px;color:#8A9E8C;margin-bottom:4px">${label}</div>
      <div id="editorRating" style="margin-bottom:14px"></div>
      <div style="font-size:11.5px;color:#8A9E8C;margin-bottom:10px">Tap to toggle steps done ↕</div>
      <div id="editStepList" style="display:flex;flex-direction:column;gap:8px">${stepsHtml}</div>
      <button onclick="closeDayEditor()" style="margin-top:20px;width:100%;padding:14px;background:#2E7D32;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700">Done ✓</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeDayEditor();});
  updateEditorRating(ds);
}

function updateEditorRating(ds){
  const h=ST.history[ds];
  if(!h)return;
  const r=getRating(h.done,h.total);
  const el=document.getElementById('editorRating');
  if(el)el.innerHTML=`<span style="font-size:13px;color:#556655">${h.done}/${h.total} steps</span> <span class="rpill ${r}" style="font-size:11px;padding:2px 8px">${ratingLabel(r)}</span>`;
}

function togglePastStep(ds,id,checked){
  const h=ST.history[ds];
  if(!h)return;
  if(!h.checkedIds)h.checkedIds=[];
  if(checked&&!h.checkedIds.includes(id))h.checkedIds.push(id);
  else if(!checked)h.checkedIds=h.checkedIds.filter(x=>x!==id);
  h.done=h.checkedIds.length;
  saveState();
  // Update label style
  const lbl=document.querySelector(`input[onchange="togglePastStep('${ds}','${id}',this.checked)"]`)?.parentElement;
  if(lbl){lbl.classList.toggle('edit-done',checked);}
  updateEditorRating(ds);
}

function closeDayEditor(){
  const ov=document.getElementById('dayEditorOverlay');
  if(ov)ov.remove();
  renderHistory();
}

// ═══════════════════════ SETTINGS ═══════════════════════
function renderSettings(){
  const wk=weekNum(),lim={1:12,2:8,3:999}[ST.stage];
  const pct=lim<999?Math.min(100,Math.round(wk/lim*100)):100;
  const days=Math.max(0,Math.floor((Date.now()-new Date(ST.startDate).getTime())/86400000));
  document.getElementById('dateIn').value=ST.startDate;

  document.getElementById('statBox').innerHTML=[
    ['Current Stage',`Stage ${ST.stage}`],
    ['Started',new Date(ST.startDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})],
    ['Days in Stage',`${days} days`],
    ['Current Week',`Week ${wk}`],
    ['Stage Progress',lim<999?`${pct}% of ${lim} weeks`:'Maintenance — no limit'],
  ].map(([k,v])=>`<div class="srow"><span class="sk">${k}</span><span class="sv">${v}</span></div>`).join('');

  document.getElementById('stageRow').innerHTML=[1,2,3].map(n=>`
    <div class="stage-opt${ST.stage===n?' sel':''}" onclick="changeStage(${n})">
      <div class="stage-num">${n}</div>
      <div class="stage-lbl">${['Foundation','Exfoliants','Maintenance'][n-1]}</div>
    </div>`).join('');

  const ab=document.getElementById('alertBox');
  if(ST.stage===1&&wk>=12){
    ab.innerHTML=`<div class="alert-box warn"><div class="at">⚡ Ready for Stage 2!</div><p class="ab">Week ${wk} of Stage 1 complete. If your skin is calm and barrier is stable — you're ready to upgrade!</p><button class="btn" onclick="changeStage(2);switchView('Routine')">Move to Stage 2 →</button></div>`;
  }else if(ST.stage===1&&wk>=8){
    ab.innerHTML=`<div class="alert-box info"><div class="at">💡 Stage 2 Coming Soon</div><p class="ab" style="margin-bottom:0">Week ${wk}. Stage 2 available now if barrier is stable, or safely at Week 12.</p></div>`;
  }else ab.innerHTML='';

  document.getElementById('howBox').innerHTML=[
    'Open every morning — shows today\'s routine automatically (Gym or Rest day)',
    'Tap any step card to mark it ✅ Done — it turns green',
    'Work through all 4 tabs: Morning → After Wudu → Evening → Night',
    'Checks reset automatically at midnight for the new day',
    'Tap ↺ button to reset today\'s ticks manually',
    'History tab saves ALL TIME — streak, heatmap, perfect days, most skipped',
    'App alerts at Week 8 and Week 12 when it\'s time to upgrade stage',
    '⚠️ Must use NORMAL Safari (not Private Browsing) for saving to work',
  ].map((t,i)=>`<div style="display:flex;gap:8px;margin-bottom:9px;align-items:flex-start"><span style="font-weight:800;color:#2C4B2F;font-size:13px;flex-shrink:0;margin-top:1px">${i+1}.</span><span style="font-size:12.5px;color:#556655;line-height:1.5">${t}</span></div>`).join('');
}

function saveDate(v){ST.startDate=v;saveState();renderSettings();showToast('Start date saved ✓');}
function changeStage(n){
  ST.stage=n;ST.startDate=todayStr();ST.checks={};saveState();
  renderSettings();render();
  showToast(n>1?`🎉 Moved to Stage ${n}!`:`Set to Stage ${n}`);
}

// ═══════════════════════ VIEW SWITCHING ═══════════════════════
function switchView(v){
  ['Routine','History','Settings'].forEach(name=>{
    document.getElementById('v'+name).classList.toggle('on',name===v);
  });
  document.getElementById('nRoutine').classList.toggle('on',v==='Routine');
  document.getElementById('nHistory').classList.toggle('on',v==='History');
  window.scrollTo({top:0,behavior:'instant'});
  if(v==='History'){renderHistory();}
  if(v==='Settings'){renderSettings();}
}

// ═══════════════════════ INIT ═══════════════════════
render();
</script>
